name="viewport"

<body>

class="main-header">

class="section">

class="section-header">

id="viewall-container"
class="movies-row">

<script>

const movies=

JSON.parse(

localStorage.getItem(

"viewAllData"

)

)||[];


const container=

document.getElementById(

"viewall-container"

container.innerHTML="";


movies.forEach(

movie=>{

container.appendChild(

createMovieCard(

movie

)

);

}

);
